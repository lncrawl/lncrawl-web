name: Generate Policy HTML

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'PRIVACY_POLICY.md'
      - 'TERMS_OF_SERVICE.md'
      - 'scripts/generate_policy_html.py'
      - '.github/workflows/generate-policy-html.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate_html:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐍 Set Up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install markdown

      - name: ⚙️ Generate HTML files
        run: python3 ./scripts/generate_policy_html.py

      - name: ✅ Commit and Push HTML files
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: |
            Generate HTML files from markdown

            - Auto-generated from PRIVACY_POLICY.md and TERMS_OF_SERVICE.md
          file_pattern: |
            public/*.html
