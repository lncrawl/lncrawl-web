name: Lint & Build
run-name: "Web CI${{ github.event_name == 'pull_request' && format(' - PR #{0}', github.event.pull_request.number) || format(' - {0}', github.ref_name) }}"

on:
  push: {}
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🧪 Run lint
        run: yarn lint

      - name: 🧪 Run build
        run: yarn build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: ${{ github.workspace }}/dist
